<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHAWNDERMIXER</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Toolbar -->
  <header id="toolbar">
    <div class="toolbar-left">
      <span class="logo">SHAWNDERMIXER</span>
      <div class="toolbar-group">
        <button id="btn-new" title="New Project">New</button>
        <button id="btn-open" title="Open Project (Ctrl+O)">Open</button>
        <button id="btn-save" title="Save Project (Ctrl+S)">Save</button>
        <button id="btn-import" title="Import Audio (Ctrl+I)">Import</button>
        <button id="btn-export" title="Export WAV (Ctrl+E)">Export</button>
        <button id="btn-stems" class="btn-stems" title="Split Stems (Demucs AI)">Split Stems</button>
      </div>
    </div>
    <div class="toolbar-center">
      <button id="btn-stop" class="transport-btn" title="Stop">&#9632;</button>
      <button id="btn-play" class="transport-btn" title="Play (Space)">&#9654;</button>
      <button id="btn-pause" class="transport-btn" title="Pause (Space)">&#10074;&#10074;</button>
      <button id="btn-record" class="transport-btn btn-rec" title="Record Automation (R)">&#9679;</button>
      <button id="btn-loop" class="transport-btn" title="Loop (L)">&#8634;</button>
      <span id="time-display" class="time-display">0:00.0</span>
    </div>
    <div class="toolbar-right">
      <label class="toolbar-label">BPM <input id="bpm-input" type="number" min="20" max="300" value="120"></label>
      <label class="toolbar-label">Master <input id="master-volume" type="range" min="0" max="1.5" step="0.01" value="1"></label>
    </div>
  </header>

  <!-- Timeline -->
  <section id="timeline">
    <div id="drop-overlay">Drop audio files here</div>
    <div id="ruler-wrap">
      <canvas id="ruler-canvas"></canvas>
    </div>
    <div id="playhead"></div>
    <div id="loop-region"></div>
    <div id="tracks-container">
      <div class="empty-state" id="empty-state">
        Drag and drop audio files here<br>
        <span>or use Import to add tracks</span>
      </div>
    </div>
  </section>

  <!-- Mixer Panel -->
  <section id="mixer-wrap">
    <div class="mixer-label">MIXER</div>
    <div id="mixer-panel"></div>
  </section>

  <!-- Status Bar -->
  <footer id="status-bar">Loading...</footer>

  <!-- Scripts — load order matters -->
  <script src="js/engine.js"></script>
  <script src="js/track.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/fx/eq.js"></script>
  <script src="js/fx/reverb.js"></script>
  <script src="js/fx/delay.js"></script>
  <script src="js/fx/compressor.js"></script>
  <script src="js/waveform.js"></script>
  <script src="js/automation.js"></script>
  <script src="js/ui/timeline.js"></script>
  <script src="js/ui/mixer-panel.js"></script>
  <script src="js/ui/transport.js"></script>
  <script src="js/ui/file-menu.js"></script>
  <script src="js/ui/drag-drop.js"></script>
  <script src="js/ui/stem-split.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
