name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build site index
        run: |
          mkdir -p _site
          cp -r bible-reader _site/bible-reader
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Shawn's Projects</title>
            <style>
              body { font-family: Georgia, serif; background: #f4efe4; color: #3a3226; max-width: 600px; margin: 60px auto; padding: 0 20px; }
              h1 { font-weight: 300; letter-spacing: 2px; font-size: 24px; }
              a { display: block; padding: 14px 0; border-bottom: 1px solid rgba(0,0,0,0.06); color: #6d553a; text-decoration: none; font-size: 18px; }
              a:hover { color: #3a3226; }
              .desc { font-size: 13px; color: #a89c8c; }
            </style>
          </head>
          <body>
            <h1>Projects</h1>
            <a href="bible-reader/">Bible Reader <span class="desc">KJV reader with Words of Jesus mode</span></a>
          </body>
          </html>
          HTMLEOF

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
