<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CODE JAM — Visualizer</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; cursor: none; }
    canvas { display: block; }
    #fade-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      opacity: 1;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.6s ease;
    }
    #fade-overlay.transparent { opacity: 0; }
  </style>
</head>
<body>
  <div id="fade-overlay"></div>
  <script src="visualizer.js"></script>
</body>
</html>
